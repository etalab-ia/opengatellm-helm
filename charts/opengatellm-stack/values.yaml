global:
  storage:
    storageClassName: sbs-default

opengatellm-core:
  enabled: true
  postgresql:
    fullnameOverride: "opengatellm-stack-postgres"
    cluster:
      initdb:
        postInitApplicationSQL:
          - CREATE DATABASE playground WITH ENCODING 'UTF8';

  # values for opengateLLM API
  api:
    replicas: 1
    image:
      repository: ghcr.io/etalab-ia/opengatellm/api
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "200m"
        memory: "1Gi"
      limits:
        cpu: "1"
        memory: "3Gi"
    service:
      type: ClusterIP
      port: 8000
    logging:
      level: "INFO"

    models:
      - name: BAAI/bge-m3
        type: text-embeddings-inference
        dimensions: 1024
        providers:
          - type: tei
            model_name: "BAAI/bge-m3"
            url: "http://opengatellm-stack-embeddings/"
            key: "changeme"


    structuredConfig:
      dependencies:
        postgres:
          url: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/api
          echo: False
          pool_size: 5
          max_overflow: 10
          pool_pre_ping: true
          connect_args:
            server_settings:
              application_name: "OpenGateLLM"
              statement_timeout: "60s"
          
        redis:
          url: redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}
          max_connections: 200
          socket_connect_timeout: 5
          retry_on_timeout: true
          health_check_interval: 30
          decode_responses: false
          socket_keepalive: true

        elasticsearch:
          index_name: opengatellm
          index_language: english
          number_of_shards: 4
          number_of_replicas: 2
          request_timeout: 120
          retry_on_timeout: true
          hosts: "http://{{ .Release.Name }}-elasticsearch-es-http:9200"

      settings:
        swagger_version: "{{ .Values.api.image.tag | default .Chart.AppVersion }}"
        log_level: INFO
        vector_store_model: "BAAI/bge-m3"

      playground:
        api_url: "http://opengatellm-core:8000"

    probes:
      readiness:
        httpGet:
          path: /health
          port: http
        initialDelaySeconds: 60
        periodSeconds: 15
      liveness:
        httpGet:
          path: /health
          port: http
        initialDelaySeconds: 200
        periodSeconds: 30

playground:
  replicas: 1
  image:
    repository: ghcr.io/etalab-ia/opengatellm/playground
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 8501
  probes:
    readiness:
      path: /
      initialDelaySeconds: 5
      periodSeconds: 10
    liveness:
      path: /
      initialDelaySeconds: 10
      periodSeconds: 10
  config:
    api_url: "http://opengatellm-core:8000"
    default_model: ""
    postgres:
      url: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/playground

vllm-stack:
  enabled: true
  routerSpec:
    serviceType: ClusterIP
    servicePort: 80
    resources:
      requests:
        cpu: 400m
        memory: 1Gi
      limits:
        memory: 2Gi
  servingEngineSpec:
    enableEngine: true
    vllmApiKey: "changeme"
    modelSpec:
      - name: "ministral-3b"
        repository: vllm/vllm-openai
        tag: v0.11.0
        imagePullPolicy: IfNotPresent
        modelURL: mistralai/Ministral-3-3B-Instruct-2512

        replicaCount: 1
        requestCPU: 2
        requestMemory: "8G"
        requestGPU: 1
        limitCPU: "6"
        limitMemory: "20G"

        pvcStorage: "20Gi"
        storageClass: sbs-default
        pvcAccessMode:
          - ReadWriteOnce

        shmSize: "2Gi"

        vllmConfig:
          tensorParallelSize: 1
          enablePrefixCaching: false
          extraArgs:
            - "--tokenizer_mode"
            - "mistral"
            - "--config_format"
            - "mistral"
            - "--load_format"
            - "mistral"
            - "--tool-call-parser"
            - "mistral"
            - "--enable-auto-tool-choice"
            - "--max-model-len"
            - "128000"

        hf_token:
          secretName: "huggingface-token"
          secretKey: "token"

embeddings:
  enabled: true
  replicas: 1
  image:
    repository: ghcr.io/huggingface/text-embeddings-inference
    tag: cpu-latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 8000
  config:
    model: BAAI/bge-m3
    port: 8000
  resources:
    limits:
      cpu: "4"
      memory: 28Gi
      gpu: 0
    requests:
      cpu: "2"
      memory: 16Gi
      gpu: 0
  probes:
    readiness:
      enabled: true
      path: /health
      initialDelaySeconds: 30
      periodSeconds: 120
    liveness:
      enabled: false
      path: /health
      initialDelaySeconds: 240
      periodSeconds: 30

huggingface:
  token: "changeme"

# ES deployment follows this recommended deployment : https://www.elastic.co/docs/deploy-manage/deploy/cloud-on-k8s/install-using-helm-chart
elasticsearch:
  enabled: true
  version: "9.0.8"
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "1Gi"
    limits:
      cpu: "400m"
      memory: "4Gi"
  persistence:
    enabled: true
    size: 8Gi

eck-operator-crds:
  {}

eck-operator:
  installCRDs: false
  createClusterScopedResources: true
  webhook:
    enabled: false
  config:
    validateStorageClass: false

  resources:
    limits:
      cpu: 1
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 150Mi